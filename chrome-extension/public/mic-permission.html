<!DOCTYPE html>
<html>
<head>
  <title>Allow Microphone — Visual Issue Reporter</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 16px;
      padding: 32px 40px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h2 { margin: 0 0 8px; font-size: 18px; color: #f1f5f9; }
    p { margin: 8px 0; color: rgba(241,245,249,0.6); font-size: 14px; line-height: 1.5; }
    .btn {
      margin-top: 20px;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #8b5cf6;
      color: white;
    }
    .btn-primary:hover { background: #7c3aed; }
    .status { margin-top: 16px; font-size: 13px; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .icon { margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <path d="M12 2.75C10.4812 2.75 9.25 3.98122 9.25 5.5V12C9.25 13.5188 10.4812 14.75 12 14.75C13.5188 14.75 14.75 13.5188 14.75 12V5.5C14.75 3.98122 13.5188 2.75 12 2.75Z" stroke="#a78bfa" stroke-width="1.5"/>
        <path d="M6.25 11C6.25 14.1756 8.82436 16.75 12 16.75C15.1756 16.75 17.75 14.1756 17.75 11" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M12 17.75V21.25" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h2>Microphone Access</h2>
    <p>Click the button below and allow microphone access in the Chrome prompt that appears.</p>
    <button class="btn btn-primary" id="allow">Allow Microphone</button>
    <div class="status" id="status"></div>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
