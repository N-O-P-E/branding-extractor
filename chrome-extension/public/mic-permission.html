<!DOCTYPE html>
<html>
<head>
  <title>Allow Microphone — Visual Issue Reporter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300..600&family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent-primary: #8b5cf6;
      --accent-hover: #7c3aed;
      --accent-subtle: #a78bfa;
      --accent-gradient: linear-gradient(135deg, #7c3aed, #9333ea);
      --text-primary: #f1f5f9;
      --text-secondary: rgba(241,245,249,0.45);
      --text-on-accent: #ffffff;
      --border-default: rgba(148,163,184,0.15);
      --heading-color: #a78bfa;
      --status-success: #4ade80;
      --status-error: #f87171;
      --font-heading: 'Instrument Serif', serif;
      --font-heading-weight: 400;
      --font-heading-tracking: normal;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body-tracking: normal;
    }

    [data-theme="ask-phill"] {
      --bg-primary: #121212;
      --bg-secondary: #1C1C1C;
      --accent-primary: #DE0015;
      --accent-hover: #B80011;
      --accent-subtle: #D8CCB5;
      --accent-gradient: linear-gradient(135deg, #DE0015, #B80011);
      --text-primary: #FAF8F7;
      --text-secondary: rgba(250,248,247,0.5);
      --text-on-accent: #FAF8F7;
      --border-default: rgba(255,255,255,0.1);
      --heading-color: #FAF8F7;
      --status-success: #25B845;
      --status-error: #DE0015;
      --font-heading: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-heading-weight: 700;
      --font-heading-tracking: -0.08em;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body-tracking: -0.08em;
    }

    [data-theme="strix"] {
      --bg-primary: #1A1A1A;
      --bg-secondary: #222222;
      --accent-primary: #FFDB32;
      --accent-hover: #E6C52D;
      --accent-subtle: rgba(255,219,50,0.7);
      --accent-gradient: linear-gradient(135deg, #FFDB32, #E6C52D);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255,255,255,0.55);
      --text-on-accent: #1A1A1A;
      --border-default: rgba(255,255,255,0.1);
      --heading-color: #FFFFFF;
      --status-success: #4ade80;
      --status-error: #f87171;
      --font-heading: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-heading-weight: 600;
      --font-heading-tracking: -0.03em;
      --font-body: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body-tracking: -0.02em;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      letter-spacing: var(--font-body-tracking);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: 16px;
      padding: 32px 40px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      font-family: var(--font-heading);
      font-weight: var(--font-heading-weight);
      letter-spacing: var(--font-heading-tracking);
      color: var(--heading-color);
    }
    p {
      margin: 8px 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-body);
      letter-spacing: var(--font-body-tracking);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--accent-gradient);
      color: var(--text-on-accent);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 16px; font-size: 13px; }
    .success { color: var(--status-success); }
    .error { color: var(--status-error); }
    .icon { margin-bottom: 12px; color: var(--accent-subtle); }
    .icon svg { color: inherit; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="48" height="48" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <path d="M12.0009 19C15.0764 19 17.7195 17.1489 18.8769 14.5M12.0009 19C8.92546 19 6.28233 17.1489 5.125 14.5M12.0009 19V21.25M12.0009 15.75C9.65372 15.75 7.75093 13.8472 7.75093 11.5V7C7.75093 4.65279 9.65372 2.75 12.0009 2.75C14.3481 2.75 16.2509 4.65279 16.2509 7V11.5C16.2509 13.8472 14.3481 15.75 12.0009 15.75Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Microphone Access</h2>
    <p>Click the button below and allow microphone access in the Chrome prompt that appears.</p>
    <button class="btn btn-primary" id="allow">Allow Microphone</button>
    <div class="status" id="status"></div>
  </div>
  <script>
    // Apply saved theme before paint
    chrome.storage.local.get(['extensionTheme', 'unlockedThemes'], (result) => {
      const theme = result.extensionTheme;
      const unlocked = result.unlockedThemes || [];
      if (theme && theme !== 'default' && unlocked.some(t => t.id === theme)) {
        document.documentElement.setAttribute('data-theme', theme);
      }
    });
  </script>
  <script src="mic-permission.js"></script>
</body>
</html>
